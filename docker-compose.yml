services:
  dev:
    build:
      context: .
      args:
        PG_MAJOR: ${PG_MAJOR:-18}
    container_name: pg_timers-dev
    profiles: [dev, test]
    environment:
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    command: >
      -c shared_preload_libraries=pg_timers
      -c pg_timers.database=testdb
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 15

  test:
    build:
      context: .
      args:
        PG_MAJOR: ${PG_MAJOR:-18}
    profiles: [test]
    depends_on:
      dev:
        condition: service_healthy
    environment:
      PGPASSWORD: test
    entrypoint: ["pg_prove", "-U", "postgres", "-h", "dev", "-d", "testdb", "--ext", ".sql", "/t/"]
