# Example: Using pg_timers with CloudNativePG
#
# Prerequisites:
#   - CloudNativePG operator installed (v1.28+)
#   - Kubernetes 1.33+ with ImageVolume feature gate enabled
#     (enabled by default in Kubernetes 1.35+)
#   - containerd v2.1.0+ or CRI-O v1.31+
#
# Apply with: kubectl apply -f cnpg-cluster.yaml
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cluster-with-timers
spec:
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:18

  postgresql:
    shared_preload_libraries:
      - pg_timers
    parameters:
      pg_timers.database: "app"
    extensions:
      - name: pg-timers
        image:
          reference: ghcr.io/vabatta/pg_timers-cnpg:18-latest

  bootstrap:
    initdb:
      database: app
      owner: app
      postInitApplicationSQL:
        - CREATE EXTENSION pg_timers

  storage:
    size: 1Gi
